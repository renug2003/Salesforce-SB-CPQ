<template>
    <div class="slds-p-around_medium">
        <template if:false={isDone}>
            <div class="slds-text-align_center slds-p-vertical_medium">
                <lightning-icon icon-name="utility:pdf_ext" size="large" class="slds-m-bottom_medium"></lightning-icon>
                <h2 class="slds-text-heading_medium slds-m-bottom_small">Generate Proposal PDF</h2>
                <p class="slds-text-body_regular slds-m-bottom_large" style="color:#555;">
                    A branded PDF proposal will be generated from this quote and saved to Salesforce Files on this record.
                </p>
                <template if:true={hasError}>
                    <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                        <lightning-icon icon-name="utility:error" size="x-small" alternative-text="Error"></lightning-icon>
                        &nbsp;{errorMessage}
                    </div>
                </template>
                <div class="slds-button-group">
                    <button class="slds-button slds-button_neutral" onclick={handleCancel} disabled={isGenerating}>Cancel</button>
                    <button class="slds-button slds-button_brand" onclick={handleGenerate} disabled={isGenerating}>
                        <template if:true={isGenerating}>
                            <lightning-spinner size="small" alternative-text="Generating..."></lightning-spinner>
                            &nbsp;Generating...
                        </template>
                        <template if:false={isGenerating}>
                            <lightning-icon icon-name="utility:salesforce1" size="x-small" alternative-text="Generate"></lightning-icon>
                            &nbsp;Generate PDF
                        </template>
                    </button>
                </div>
            </div>
        </template>
        <template if:true={isDone}>
            <div class="slds-text-align_center slds-p-vertical_medium">
                <lightning-icon icon-name="utility:success" size="large" style="color:#2e7d32;" class="slds-m-bottom_small"></lightning-icon>
                <h2 class="slds-text-heading_medium slds-m-bottom_small">Proposal PDF Created!</h2>
                <div class="slds-box slds-theme_shade slds-m-vertical_medium" style="border-left:4px solid #2e7d32; text-align:left; padding:0.75rem 1rem;">
                    <lightning-icon icon-name="utility:attach" size="x-small" alternative-text="File"></lightning-icon>
                    &nbsp;The PDF has been saved to the <strong>Files</strong> section of this Quote. Click below to open the Quote record and view the file.
                </div>
                <div class="slds-button-group">
                    <button class="slds-button slds-button_brand" onclick={handleViewFiles}>
                        <lightning-icon icon-name="utility:open" size="x-small" alternative-text="Open"></lightning-icon>
                        &nbsp;Open Quote &amp; View Files
                    </button>
                    <button class="slds-button slds-button_neutral" onclick={handleCancel}>Close</button>
                </div>
            </div>
        </template>
    </div>
</template>
