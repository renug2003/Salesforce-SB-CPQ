<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 70" width="260" height="70">
  <!-- Delta Dental green leaf/arrow mark -->
  <!-- Outer green triangle (pointing right) -->
  <polygon points="8,35 38,4 38,66" fill="#43A047"/>
  <!-- Inner cutout to create hollow effect -->
  <polygon points="16,35 35,12 35,58" fill="#ffffff" opacity="0.3"/>
  <!-- Second overlapping triangle for the leaf shape -->
  <polygon points="22,35 48,8 48,62" fill="#2E7D32"/>
  <!-- Third triangle - lighter, creates depth -->
  <polygon points="34,35 56,14 56,56" fill="#66BB6A"/>

  <!-- DELTA DENTAL text -->
  <text x="68" y="27" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="900" fill="#1B5E20" letter-spacing="1">DELTA DENTAL</text>
  <!-- of California subtext -->
  <text x="69" y="47" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#388E3C" letter-spacing="0.5">of California</text>
</svg>
